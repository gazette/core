name: Gazette Continuous Integration

on:
  push:
    branches: [arize, arize-dev/*]
  pull_request:
    branches: [arize]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # Full history.

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: 'google-github-actions/auth@3a3c4c57d294ef65efaaee4ff17b22fa88dd3c69' # v1
        with:
          token_format: "access_token"
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: projects/${{ secrets.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@e30db14379863a8c79331b04a9969f4c1e225e0b' # v1

      - name: 'Use gcloud CLI'
        run: gcloud info

      - uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version-file: 'go.mod'
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler librocksdb-dev libsqlite3-dev etcd-server 
      - run: |
          sha=${{ github.sha }}
          if [[ '${{ github.ref }}' == 'refs/heads/arize' ]]; then
                version="arize-${sha:0:7}"
          else
                version="dev-${sha:0:7}"
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - run: make go-test-ci
      - run: make go-build

      - run: gcloud auth configure-docker ${{ secrets.REGISTRY }}
      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .build
          file: Dockerfile
          target: broker
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: "${{ secrets.REGISTRY_PATH }}/gazette/broker:${{ env.VERSION }}"
          push: true
